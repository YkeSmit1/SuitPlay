name: Take iOS Simulator Screenshots

on:
  workflow_dispatch:

jobs:
  screenshots:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3'

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Build for iPhone simulator (arm64)
        run: |
          dotnet build suitplay/suitplay.csproj \
            -f:net9.0-ios \
            -c Release \
            /p:RuntimeIdentifier=iossimulator-arm64 \
            /p:CodesignKey="" \
            /p:CodesignProvision=""

      - name: Take iPhone screenshot (6.5 inch)
        run: |
          xcrun simctl boot "iPhone 17 Pro Max"
          open -a Simulator
          sleep 30

          xcrun simctl install booted suitplay/bin/Release/net9.0-ios/iossimulator-arm64/suitplay.app
          xcrun simctl launch booted com.companyname.suitplay
          sleep 20
          xcrun simctl io booted screenshot iphone_6_5.png
          xcrun simctl shutdown booted

      - name: Take iPad Pro 12.9 inch screenshot (13 inch)
        run: |
          # Boot simulator
          xcrun simctl boot "iPad Pro 13-inch (M5)"
          open -a Simulator
          sleep 30

          # Install and launch app
          xcrun simctl install booted suitplay/bin/Release/net9.0-ios/iossimulator-x64/suitplay.app
          xcrun simctl launch booted com.companyname.suitplay
          sleep 240

          # Take screenshot
          xcrun simctl io booted screenshot ipad_13.png
          xcrun simctl shutdown booted
      - name: Check simulator logs
        if: always()
        run: |
          xcrun simctl launch booted com.companyname.suitplay 2>&1 || true
          log show --predicate 'process == "suitplay"' --last 5m | tail -50
          
      - name: Upload screenshots
        uses: actions/upload-artifact@v7
        with:
          name: app-screenshots
          path: |
            iphone_6_5.png
            ipad_13.png
          retention-days: 5
