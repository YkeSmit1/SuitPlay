name: Workflow iOS App

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:

    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3'
          
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'
          source-url: https://nuget.pkg.github.com/YkeSmit1/index.json
        env:
          NUGET_AUTH_TOKEN: ${{secrets.GITHUB_TOKEN}}     

      - name: Install MAUI Workloads
        run: dotnet workload install maui@9.0.120

      - name: Restore dependencies
        run: dotnet restore

      - name: Install certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.APPLE_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo $BUILD_CERTIFICATE_BASE64 | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import certificate.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s build.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain        

      - name: Install provisioning profile
        env:
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo $BUILD_PROVISION_PROFILE_BASE64 | base64 --decode > $PP_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

      - name: Build iOS .ipa
        timeout-minutes: 30
        run: |
          dotnet publish suitplay/suitplay.csproj \
            -f:net9.0-ios \
            -c Release \
            /p:ArchiveOnBuild=true \
            /p:RuntimeIdentifier=ios-arm64 \
            /p:CodesignKey="Apple Distribution: Yke Smit (L7Y5LALL64)" \
            /p:CodesignProvision="suitplay_distribute" \
            /p:MtouchUseLlvm=false \

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ios-app
          path: ./SuitPlay/bin/Release/net9.0-ios/ios-arm64/publish/suitplay.ipa
